apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-docs
  labels:
    app: mcp-docs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-docs
  template:
    metadata:
      labels:
        app: mcp-docs
    spec:
      containers:
        - name: mcp-docs
          image: your-registry/mcp-docs:latest
          ports:
            - containerPort: 8080
          env:
            - name: MCP_DOCS_DIR
              value: /docs
          volumeMounts:
            - name: docs
              mountPath: /docs
              readOnly: true
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: docs
          persistentVolumeClaim:
            claimName: mcp-docs-pvc
